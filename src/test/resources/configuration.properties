# Configuration file for the test automation suite.
url=https://restful-booker.herokuapp.com/
# Retry logic configurations
retry-logic.max-retries=3
# Report configurations
# 0 - No logs.
# 1 - FATAL - Logs for critical errors in the test framework.
# 2 - FAIL - Logs for failed test steps.
# 3 - WARN - Logs for warning steps that may indicate failures.
# 4 - PASS - Logs for passed test steps.
# 5 - INFO - Logs for informational steps that may not decide pass/fail conditions.
# 6 - DEBUG - Logs for debug steps that can be used to debug normal working of the test framework.
report.log-level=6
